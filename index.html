<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventaire — HiloFood</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1C3A2A;
    --forest-mid: #2D5640;
    --leaf: #4A8C5C;
    --leaf-light: #C8E6C9;
    --sand: #F5EFE0;
    --cream: #FDFAF4;
    --amber: #C8956C;
    --red-rupture: #D32F2F;
    --red-light: #FFEBEE;
    --text: #1A2E20;
    --text-muted: #6B8F71;
    --border: #D8E8DC;
    --white: #FFFFFF;
    --shadow: 0 2px 12px rgba(28,58,42,0.10);
    --shadow-card: 0 1px 4px rgba(28,58,42,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100vh;
  }

  /* ---- HEADER ---- */
  .header {
    background: var(--forest);
    padding: 28px 24px 22px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(28,58,42,0.25);
  }
  .header-inner {
    max-width: 640px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo-wrap {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    background: white;
    border: 2px solid rgba(255,255,255,0.3);
  }
  .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .header-text h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: #fff;
    letter-spacing: 0.01em;
    line-height: 1.2;
  }
  .header-text p {
    font-size: 12px;
    color: var(--leaf-light);
    font-weight: 300;
    margin-top: 2px;
  }

  /* ---- PROGRESS ---- */
  .progress-bar-wrap {
    background: var(--forest-mid);
    padding: 8px 24px;
  }
  .progress-bar-inner { max-width: 640px; margin: 0 auto; }
  .progress-track {
    background: rgba(255,255,255,0.15);
    border-radius: 999px;
    height: 5px;
    overflow: hidden;
  }
  .progress-fill {
    background: var(--leaf-light);
    height: 100%;
    border-radius: 999px;
    width: 0%;
    transition: width 0.4s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(255,255,255,0.6);
    margin-top: 5px;
  }

  /* ---- MAIN ---- */
  .main { max-width: 640px; margin: 0 auto; padding: 20px 16px 40px; }

  /* ---- META CARD ---- */
  .meta-card {
    background: var(--white);
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    border: 1px solid var(--border);
  }
  .meta-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .meta-field { flex: 1; min-width: 160px; }
  .meta-field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .meta-field select,
  .meta-field input {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--cream);
    appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .meta-field select:focus,
  .meta-field input:focus { border-color: var(--leaf); }
  .meta-field select { cursor: pointer; }

  /* ---- COLLABORATEUR SELECT ---- */
  .collab-field { margin-top: 14px; }
  .collab-field label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .collab-field select {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--cream);
    appearance: none;
    outline: none;
    transition: border-color 0.2s;
  }
  .collab-field select:focus { border-color: var(--leaf); }

  /* ---- SECTION HEADER ---- */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 24px 0 10px;
  }
  .section-title {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    color: var(--forest);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-count {
    font-size: 12px;
    background: var(--leaf-light);
    color: var(--forest);
    padding: 3px 10px;
    border-radius: 999px;
    font-weight: 500;
  }

  /* ---- ITEM CARD ---- */
  .item-card {
    background: var(--white);
    border-radius: 12px;
    padding: 12px 14px;
    margin-bottom: 8px;
    border: 1.5px solid var(--border);
    box-shadow: var(--shadow-card);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .item-card.has-value { border-color: var(--leaf); }
  .item-card.is-rupture {
    border-color: var(--red-rupture);
    background: var(--red-light);
  }
  .item-top {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .item-name {
    flex: 1;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
  }
  .item-unite {
    font-size: 11px;
    color: var(--text-muted);
    display: block;
    margin-top: 1px;
    font-weight: 400;
  }

  /* ---- RUPTURE BUTTON ---- */
  .btn-rupture {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    border-radius: 8px;
    border: 1.5px solid #FFCDD2;
    background: #FFF5F5;
    color: var(--red-rupture);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s;
    letter-spacing: -0.02em;
    font-family: 'DM Sans', sans-serif;
  }
  .btn-rupture:hover { background: #FFEBEE; border-color: var(--red-rupture); }
  .btn-rupture.active {
    background: var(--red-rupture);
    border-color: var(--red-rupture);
    color: white;
  }

  /* ---- QUANTITE STEPPER ---- */
  .stepper {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .stepper button {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: var(--cream);
    font-size: 18px;
    font-weight: 300;
    color: var(--forest);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    line-height: 1;
  }
  .stepper button:hover { background: var(--leaf-light); border-color: var(--leaf); }
  .stepper input {
    width: 52px;
    height: 32px;
    text-align: center;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    color: var(--forest);
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    outline: none;
    transition: border-color 0.2s;
  }
  .stepper input:focus { border-color: var(--leaf); }
  .stepper input:disabled { background: #f3f3f3; color: #bbb; }

  /* ---- COMMENT TOGGLE ---- */
  .item-bottom { margin-top: 8px; }
  .btn-comment {
    font-size: 11px;
    color: var(--text-muted);
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 0;
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s;
  }
  .btn-comment:hover { color: var(--leaf); }
  .btn-comment.has-comment { color: var(--amber); font-weight: 500; }
  .comment-input {
    margin-top: 6px;
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--cream);
    outline: none;
    resize: none;
    min-height: 48px;
    transition: border-color 0.2s;
  }
  .comment-input:focus { border-color: var(--amber); }
  .comment-display {
    margin-top: 5px;
    font-size: 12px;
    color: var(--amber);
    font-style: italic;
    padding: 4px 8px;
    background: #FFF8EE;
    border-radius: 6px;
    border-left: 3px solid var(--amber);
  }

  /* ---- GLOBAL COMMENT ---- */
  .global-comment-card {
    background: var(--white);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    margin-top: 24px;
  }
  .global-comment-card h3 {
    font-family: 'DM Serif Display', serif;
    font-size: 17px;
    color: var(--forest);
    margin-bottom: 14px;
  }
  .comment-group { margin-bottom: 14px; }
  .comment-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .comment-group textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    background: var(--cream);
    resize: none;
    min-height: 70px;
    outline: none;
    transition: border-color 0.2s;
  }
  .comment-group textarea:focus { border-color: var(--leaf); }

  /* ---- SUBMIT ---- */
  .submit-wrap { margin-top: 28px; }
  .btn-submit {
    width: 100%;
    padding: 16px;
    background: var(--forest);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 600;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.01em;
  }
  .btn-submit:hover { background: var(--forest-mid); }
  .btn-submit:active { transform: scale(0.99); }
  .btn-submit:disabled { background: #aaa; cursor: not-allowed; }

  /* ---- RUPTURE SUMMARY ---- */
  .rupture-banner {
    background: var(--red-light);
    border: 1.5px solid #FFCDD2;
    border-radius: 12px;
    padding: 12px 16px;
    margin-top: 16px;
    display: none;
  }
  .rupture-banner h4 {
    color: var(--red-rupture);
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .rupture-list { list-style: none; }
  .rupture-list li {
    font-size: 12px;
    color: var(--red-rupture);
    padding: 2px 0;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .rupture-list li::before { content: "•"; font-weight: bold; }

  /* ---- LOADING / SUCCESS ---- */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(28,58,42,0.75);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    display: none;
  }
  .overlay-card {
    background: white;
    border-radius: 20px;
    padding: 36px 32px;
    text-align: center;
    max-width: 300px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }
  .overlay-icon { font-size: 48px; margin-bottom: 14px; }
  .overlay-title {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    color: var(--forest);
    margin-bottom: 8px;
  }
  .overlay-sub { font-size: 14px; color: var(--text-muted); line-height: 1.5; }
  .spinner {
    width: 42px; height: 42px;
    border: 3px solid var(--leaf-light);
    border-top-color: var(--forest);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 18px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---- EMPTY STATE ---- */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-muted);
    font-size: 14px;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-inner">
    <div class="logo-wrap">
      <img id="logo" src="" alt="HiloFood">
    </div>
    <div class="header-text">
      <h1>Inventaire HiloFood</h1>
      <p>Saisie hebdomadaire des stocks</p>
    </div>
  </div>
</header>

<!-- PROGRESS -->
<div class="progress-bar-wrap">
  <div class="progress-bar-inner">
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label">
      <span id="progressText">0 article saisi</span>
      <span id="ruptureCount" style="color:#FFCDD2"></span>
    </div>
  </div>
</div>

<!-- MAIN -->
<main class="main">

  <!-- META CARD -->
  <div class="meta-card">
    <div class="meta-row">
      <div class="meta-field">
        <label>Restaurant</label>
        <select id="selectResto" onchange="loadCatalogue()">
          <option value="">— Choisir —</option>
        </select>
      </div>
      <div class="meta-field">
        <label>Date</label>
        <input type="date" id="inputDate">
      </div>
    </div>
    <div class="collab-field">
      <label>Collaborateur</label>
      <input type="text" id="selectCollab" placeholder="Votre prénom…">
    </div>
  </div>

  <!-- RUPTURE BANNER -->
  <div class="rupture-banner" id="ruptureBanner">
    <h4>⚠️ Produits en rupture</h4>
    <ul class="rupture-list" id="ruptureList"></ul>
  </div>

  <!-- INVENTORY SECTIONS -->
  <div id="inventoryContainer">
    <div class="empty-state">Sélectionnez un restaurant pour charger l'inventaire</div>
  </div>

  <!-- GLOBAL COMMENTS -->
  <div class="global-comment-card" id="globalComments" style="display:none">
    <h3>💬 Commentaires généraux</h3>
    <div class="comment-group">
      <label>Commandes spéciales</label>
      <textarea id="cmtCommandes" placeholder="Ex: commander plus de courgettes cette semaine…"></textarea>
    </div>
    <div class="comment-group">
      <label>Produits saisonniers</label>
      <textarea id="cmtSaison" placeholder="Ex: mangues fraîches disponibles cette semaine…"></textarea>
    </div>
    <div class="comment-group">
      <label>Remarques générales</label>
      <textarea id="cmtGeneral" placeholder="Toute autre remarque…"></textarea>
    </div>
  </div>

  <!-- SUBMIT -->
  <div class="submit-wrap" id="submitWrap" style="display:none">
    <button class="btn-submit" id="btnSubmit" onclick="submitInventaire()">
      <span>Envoyer l'inventaire</span>
      <span>→</span>
    </button>
  </div>

</main>

<!-- LOADING OVERLAY -->
<div class="overlay" id="overlayLoading" style="display:flex;display:none">
  <div class="overlay-card">
    <div class="spinner"></div>
    <div class="overlay-title">Envoi en cours…</div>
    <div class="overlay-sub">Mise à jour du stock en cours.</div>
  </div>
</div>

<!-- SUCCESS OVERLAY -->
<div class="overlay" id="overlaySuccess" style="display:none">
  <div class="overlay-card">
    <div class="overlay-icon">✅</div>
    <div class="overlay-title">Inventaire envoyé !</div>
    <div class="overlay-sub" id="successDetails"></div>
  </div>
</div>

// ---- Init date ----
document.getElementById('inputDate').value = new Date().toISOString().slice(0,10);

// ---- État ----
let inventory = [];
let itemState = {}; // { article: { qty, rupture, comment } }

// ---- LOAD RESTAURANTS ----
async function loadRestaurants() {
  try {
    const r = await fetch(APPS_SCRIPT_URL + "?action=restaurants");
    const d = await r.json();
    const sel = document.getElementById('selectResto');
    (d.restaurants || []).forEach(name => {
      const o = document.createElement('option');
      o.value = name; o.textContent = name;
      sel.appendChild(o);
    });
  } catch(e) { console.warn('Restaurants non chargés', e); }
}

// ---- LOAD CATALOGUE ----
async function loadCatalogue() {
  const resto = document.getElementById('selectResto').value;
  if (!resto) return;
  inventory = [];
  itemState = {};
  document.getElementById('inventoryContainer').innerHTML = '<div class="empty-state"><div class="spinner" style="margin:0 auto 10px"></div>Chargement…</div>';
  try {
    const r = await fetch(APPS_SCRIPT_URL + "?action=catalogue&restaurant=" + encodeURIComponent(resto));
    const d = await r.json();
    inventory = d.inventory || [];
    inventory.forEach(i => { itemState[i.article] = { qty: '', rupture: false, comment: '', showComment: false }; });
    renderInventory();
    document.getElementById('globalComments').style.display = 'block';
    document.getElementById('submitWrap').style.display = 'block';
    updateProgress();
  } catch(e) {
    document.getElementById('inventoryContainer').innerHTML = '<div class="empty-state">Erreur de chargement. Vérifiez la connexion.</div>';
  }
}

// ---- RENDER INVENTORY ----
function renderInventory() {
  const cats = [...new Set(inventory.map(i => i.cat))];
  let html = '';
  cats.forEach(cat => {
    const items = inventory.filter(i => i.cat === cat);
    const filled = items.filter(i => itemState[i.article] && (itemState[i.article].qty !== '' || itemState[i.article].rupture)).length;
    html += `<div class="section-header">
      <span class="section-title">
        ${catIcon(cat)} ${cat}
      </span>
      <span class="section-count" id="count-${slugify(cat)}">${filled}/${items.length}</span>
    </div>`;
    items.forEach(item => {
      const s = itemState[item.article];
      const isRupture = s.rupture;
      const hasValue = s.qty !== '' || s.rupture;
      html += `
      <div class="item-card ${isRupture ? 'is-rupture' : (hasValue ? 'has-value' : '')}" id="card-${slugify(item.article)}">
        <div class="item-top">
          <div class="item-name">
            ${escHtml(item.article)}
            <span class="item-unite">${escHtml(item.unite)}</span>
          </div>
          <button class="btn-rupture ${isRupture ? 'active' : ''}" onclick="toggleRupture('${escAttr(item.article)}')" title="Marquer en rupture">
            ${isRupture ? '🔴' : 'RUP'}
          </button>
          <div class="stepper">
            <button onclick="step('${escAttr(item.article)}',-1)" ${isRupture ? 'disabled' : ''}>−</button>
            <input type="number" min="0" value="${s.qty}" ${isRupture ? 'disabled' : ''}
              oninput="setQty('${escAttr(item.article)}',this.value)"
              onchange="setQty('${escAttr(item.article)}',this.value)">
            <button onclick="step('${escAttr(item.article)}',1)" ${isRupture ? 'disabled' : ''}>+</button>
          </div>
        </div>
        <div class="item-bottom">
          ${s.comment && !s.showComment
            ? `<div class="comment-display">💬 ${escHtml(s.comment)}</div>
               <button class="btn-comment has-comment" onclick="toggleComment('${escAttr(item.article)}')">✏️ Modifier le commentaire</button>`
            : s.showComment
              ? `<textarea class="comment-input" placeholder="Commentaire pour cet article…" oninput="setComment('${escAttr(item.article)}',this.value)" onblur="saveComment('${escAttr(item.article)}',this)">${escHtml(s.comment)}</textarea>
                 <button class="btn-comment" onclick="closeComment('${escAttr(item.article)}')">✓ Fermer</button>`
              : `<button class="btn-comment" onclick="toggleComment('${escAttr(item.article)}')">＋ Ajouter un commentaire</button>`
          }
        </div>
      </div>`;
    });
  });
  document.getElementById('inventoryContainer').innerHTML = html;
}

// ---- TOGGLE RUPTURE ----
function toggleRupture(article) {
  const s = itemState[article];
  s.rupture = !s.rupture;
  if (s.rupture) { s.qty = ''; }
  updateProgress();
  renderInventory();
  updateRuptureBanner();
}

// ---- STEP / SET QTY ----
function step(article, delta) {
  const s = itemState[article];
  const cur = parseFloat(s.qty) || 0;
  s.qty = Math.max(0, cur + delta).toString();
  updateProgress();
  const input = document.querySelector(`#card-${slugify(article)} input[type="number"]`);
  if (input) input.value = s.qty;
  const card = document.getElementById('card-' + slugify(article));
  if (card) card.className = 'item-card' + (s.qty !== '' ? ' has-value' : '');
  updateCatCount(article);
}

function setQty(article, val) {
  itemState[article].qty = val;
  updateProgress();
  const card = document.getElementById('card-' + slugify(article));
  if (card) card.className = 'item-card' + (val !== '' ? ' has-value' : '');
  updateCatCount(article);
}

// ---- COMMENTS ----
function toggleComment(article) {
  itemState[article].showComment = true;
  renderInventory();
}
function setComment(article, val) { itemState[article].comment = val; }
function saveComment(article, el) { itemState[article].comment = el.value; }
function closeComment(article) {
  itemState[article].showComment = false;
  renderInventory();
}

// ---- RUPTURE BANNER ----
function updateRuptureBanner() {
  const ruptures = Object.entries(itemState).filter(([,s]) => s.rupture).map(([a]) => a);
  const banner = document.getElementById('ruptureBanner');
  const list = document.getElementById('ruptureList');
  if (ruptures.length > 0) {
    banner.style.display = 'block';
    list.innerHTML = ruptures.map(a => `<li>${escHtml(a)}</li>`).join('');
  } else {
    banner.style.display = 'none';
  }
}

// ---- PROGRESS ----
function updateProgress() {
  const total = inventory.length;
  if (!total) return;
  const done = Object.values(itemState).filter(s => s.qty !== '' || s.rupture).length;
  const ruptures = Object.values(itemState).filter(s => s.rupture).length;
  const pct = Math.round(done / total * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' article' + (done > 1 ? 's' : '');
  document.getElementById('ruptureCount').textContent = ruptures > 0 ? ruptures + ' rupture' + (ruptures > 1 ? 's' : '') : '';
  updateRuptureBanner();
}

function updateCatCount(article) {
  const cat = inventory.find(i => i.article === article)?.cat;
  if (!cat) return;
  const items = inventory.filter(i => i.cat === cat);
  const filled = items.filter(i => itemState[i.article] && (itemState[i.article].qty !== '' || itemState[i.article].rupture)).length;
  const el = document.getElementById('count-' + slugify(cat));
  if (el) el.textContent = filled + '/' + items.length;
}

// ---- SUBMIT ----
async function submitInventaire() {
  const resto = document.getElementById('selectResto').value;
  const date = document.getElementById('inputDate').value;
  const collab = document.getElementById('selectCollab').value;

  if (!resto) { alert('Veuillez sélectionner un restaurant.'); return; }
  if (!date) { alert('Veuillez renseigner la date.'); return; }
  if (!collab) { alert('Veuillez sélectionner votre nom.'); return; }

  const stocks = {};
  const ruptures = [];
  const itemComments = {};

  inventory.forEach(i => {
    const s = itemState[i.article];
    if (s.rupture) {
      ruptures.push(i.article);
    } else if (s.qty !== '') {
      stocks[i.article] = parseFloat(s.qty) || 0;
    }
    if (s.comment) itemComments[i.article] = s.comment;
  });

  const payload = {
    restaurant: resto,
    date,
    collaborateur: collab,
    stocks,
    ruptures,
    itemComments,
    commentaires: {
      commandes: document.getElementById('cmtCommandes').value,
      saison: document.getElementById('cmtSaison').value,
      general: document.getElementById('cmtGeneral').value
    }
  };

  document.getElementById('overlayLoading').style.display = 'flex';
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    document.getElementById('overlayLoading').style.display = 'none';
    const rCount = ruptures.length;
    const sCount = Object.keys(stocks).length;
    document.getElementById('successDetails').innerHTML =
      `<strong>${resto}</strong><br>` +
      (rCount > 0 ? `<span style="color:#D32F2F;font-weight:600">⚠️ ${rCount} rupture${rCount>1?'s':''}</span><br>` : '') +
      `${sCount} quantité${sCount>1?'s':''} enregistrée${sCount>1?'s':''}`;
    document.getElementById('overlaySuccess').style.display = 'flex';
    setTimeout(() => { document.getElementById('overlaySuccess').style.display = 'none'; }, 4000);
  } catch(err) {
    document.getElementById('overlayLoading').style.display = 'none';
    alert('Erreur lors de l\'envoi. Vérifiez votre connexion.');
  }
}

// ---- HELPERS ----
function slugify(s) { return s.replace(/[^a-zA-Z0-9]/g, '_'); }
function escHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s) { return String(s).replace(/'/g,"\\'"); }
function catIcon(cat) {
  const icons = { 'Frigo':'🧊', 'Congélateur':'❄️', 'Sec':'📦', 'Hygiène':'🧹', 'Boissons':'🍶', 'Packaging':'🎁', 'Cowool':'🐓' };
  return icons[cat] || '📋';
}

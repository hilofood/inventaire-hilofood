<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventaire — HiloFood</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --forest: #1C3A2A; --leaf: #2D5A3D; --sage: #6B9E7A;
    --mint: #C8E6C9; --sand: #F5EFE0;
    --white: #FDFAF4; --text: #1C3A2A; --text-soft: #5C7A65;
    --border: #D4E8D8; --error: #C0392B; --radius: 14px; --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: "DM Sans", sans-serif; background: var(--sand); color: var(--text); min-height: 100vh; padding-bottom: 90px; }

  .loading-screen { position: fixed; inset: 0; background: var(--forest); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s; }
  .loading-screen.hide { opacity: 0; pointer-events: none; }
  .loading-leaf { font-size: 48px; animation: pulse 1.2s ease-in-out infinite; }
  .loading-screen p { color: rgba(255,255,255,0.7); margin-top: 16px; font-size: 15px; }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

  .header { position: relative; height: 180px; overflow: hidden; display: flex; align-items: center; justify-content: center; text-align: center; }
  .header-bg { position: absolute; inset: 0; background-size: cover; background-position: center 40%; filter: brightness(0.45); }
  .header-content { position: relative; z-index: 2; padding: 0 20px; }
  .header-leaf { font-size: 24px; margin-bottom: 6px; display: block; }
  .header h1 { font-family: "DM Serif Display", serif; font-size: clamp(24px,5vw,32px); color: #ffffff; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .header h1 em { font-style: italic; color: #a8d5b0; }
  .header p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 6px; font-weight: 300; }

  .meta-bar { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(28,58,42,0.08); }
  .meta-field label { display: block; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-soft); margin-bottom: 5px; }
  .meta-field select, .meta-field input[type="date"] { width: 100%; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: "DM Sans", sans-serif; font-size: 14px; color: var(--text); background: var(--sand); appearance: none; -webkit-appearance: none; outline: none; }
  .meta-field select:focus, .meta-field input[type="date"]:focus { border-color: var(--leaf); background: var(--white); }
  .meta-field.invalid select, .meta-field.invalid input { border-color: var(--error); }

  .progress-wrap { padding: 12px 20px 0; max-width: 640px; margin: 0 auto; }
  .progress-info { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-soft); margin-bottom: 6px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--leaf), var(--sage)); border-radius: 99px; transition: width 0.4s ease; width: 0%; }

  .section { margin: 20px 16px 0; max-width: 640px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; padding: 0 4px; }
  .section-icon { font-size: 18px; width: 36px; height: 36px; background: var(--forest); border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .section-title { font-family: "DM Serif Display", serif; font-size: 18px; color: var(--forest); }
  .section-count { margin-left: auto; font-size: 11px; color: var(--text-soft); background: var(--mint); padding: 2px 8px; border-radius: 99px; font-weight: 600; }

  .articles-grid { display: flex; flex-direction: column; gap: 8px; }
  .article-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; gap: 12px; transition: border-color 0.2s; }
  .article-card:focus-within { border-color: var(--leaf); box-shadow: 0 0 0 3px rgba(45,90,61,0.08); }
  .article-card.filled { border-color: var(--sage); background: #f7fbf8; }
  .article-info { flex: 1; min-width: 0; }
  .article-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .article-unit { font-size: 11px; color: var(--text-soft); margin-top: 2px; font-weight: 300; }
  .qty-control { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .qty-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--sand); color: var(--forest); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; user-select: none; -webkit-tap-highlight-color: transparent; transition: all 0.15s; }
  .qty-btn:active { background: var(--leaf); color: white; border-color: var(--leaf); transform: scale(0.92); }
  .qty-input { width: 52px; text-align: center; padding: 6px 4px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: "DM Sans", sans-serif; font-size: 15px; font-weight: 600; color: var(--forest); background: var(--sand); outline: none; -moz-appearance: textfield; }
  .qty-input::-webkit-inner-spin-button, .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }
  .qty-input:focus { border-color: var(--leaf); background: var(--white); }

  .comments-section { margin: 20px 16px 0; max-width: 640px; }
  .comment-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .comment-field { margin-bottom: 14px; }
  .comment-field:last-child { margin-bottom: 0; }
  .comment-field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-soft); margin-bottom: 6px; }
  .comment-field textarea { width: 100%; padding: 10px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-family: "DM Sans", sans-serif; font-size: 14px; color: var(--text); background: var(--sand); resize: vertical; min-height: 80px; outline: none; line-height: 1.5; }
  .comment-field textarea:focus { border-color: var(--leaf); background: var(--white); }
  .comment-field textarea::placeholder { color: #aaa; font-style: italic; }

  .submit-zone { position: fixed; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, var(--sand) 70%, transparent); padding: 16px 20px 24px; z-index: 200; }
  .submit-btn { width: 100%; max-width: 640px; display: flex; margin: 0 auto; padding: 16px; background: var(--forest); color: var(--white); border: none; border-radius: var(--radius); font-family: "DM Serif Display", serif; font-size: 18px; cursor: pointer; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 20px rgba(28,58,42,0.25); transition: all 0.2s; }
  .submit-btn:hover { background: var(--leaf); }
  .submit-btn:active { transform: scale(0.98); }
  .submit-btn.loading { background: var(--sage); pointer-events: none; }
  .btn-count { background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 99px; font-family: "DM Sans", sans-serif; font-size: 13px; font-weight: 600; }

  .success-screen { display: none; position: fixed; inset: 0; background: var(--forest); z-index: 999; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
  .success-screen.show { display: flex; }
  .success-icon { font-size: 64px; margin-bottom: 20px; animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  .success-screen h2 { font-family: "DM Serif Display", serif; font-size: 28px; color: var(--white); margin-bottom: 8px; }
  .success-screen p { color: rgba(255,255,255,0.7); font-size: 15px; line-height: 1.6; max-width: 320px; }
  .success-new-btn { margin-top: 36px; padding: 14px 32px; background: var(--mint); color: var(--forest); border: none; border-radius: var(--radius); font-family: "DM Sans", sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; }
  @keyframes pop { 0%{transform:scale(0);opacity:0} 100%{transform:scale(1);opacity:1} }

  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-80px); background: var(--error); color: white; padding: 12px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500; transition: transform 0.3s; z-index: 9999; white-space: nowrap; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .error-screen { display: none; padding: 60px 20px; text-align: center; }
  .error-screen.show { display: block; }
  .error-screen h2 { font-family: "DM Serif Display", serif; color: var(--forest); margin-bottom: 8px; }
  .error-screen p { color: var(--text-soft); font-size: 14px; line-height: 1.6; }

  @media (min-width: 600px) {
    .articles-grid { display: grid; grid-template-columns: 1fr 1fr; }
    .meta-bar { max-width: 640px; margin: 0 auto; }
    .section, .comments-section { margin: 20px auto 0; }
  }
</style>
</head>

      <textarea id="comment-commandes" placeholder="Ex : Commander 3 caisses de mangues suppl&#233;mentaires&#8230;"></textarea>
    </div>
    <div class="comment-field">
      <label>Produits saisonniers / arrivages</label>
      <textarea id="comment-saison" placeholder="Ex : Arriv&#233;e de fraises de saison mardi&#8230;"></textarea>
    </div>
    <div class="comment-field">
      <label>Remarques g&#233;n&#233;rales</label>
      <textarea id="comment-general" placeholder="Toute autre information utile&#8230;"></textarea>
    </div>
  </div>
</div>

<div class="error-screen" id="error-screen">
  <h2>&#9888;&#65039; Connexion impossible</h2>
  <p>Impossible de charger l'inventaire.<br>V&#233;rifiez que l'URL de la Web App est correcte.</p>
</div>

<div class="submit-zone">
  <button class="submit-btn" id="submit-btn" onclick="submitForm()">
    <span id="btn-label">Envoyer l'inventaire</span>
    <span class="btn-count" id="btn-count">0 renseign&#233;s</span>
  </button>
</div>

<div class="success-screen" id="success-screen">
  <div class="success-icon">&#9989;</div>
  <h2>Inventaire envoy&#233; !</h2>
  <p id="success-msg"></p>
  <button class="success-new-btn" onclick="resetForm()">Nouvel inventaire</button>
</div>

<div class="toast" id="toast"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzFsyeLVME2CJQrNtADsQxtzictJWObC8QNfo4otlTJSYKIvQCiIYrqSJ7atHvaoDBn/exec";

let INVENTORY = [];
let values = {};

const CAT_ICONS = {
  "Frigo": "&#129514;", "Cong\u00e9lateur": "&#10052;&#65039;", "Sec": "&#127806;",
  "Hygi\u00e8ne": "&#129529;", "Boissons": "&#129380;", "Packaging": "&#128230;",
  "Cowool": "&#127831;"
};
function getIcon(cat) { return CAT_ICONS[cat] || "&#128203;"; }

async function loadCatalogue() {
  if (!APPS_SCRIPT_URL || APPS_SCRIPT_URL === "VOTRE_URL_WEB_APP_ICI") {
    INVENTORY = [
      {cat:"Frigo", article:"Courgettes 14/21", unite:"kg"},
      {cat:"Frigo", article:"Aubergines", unite:"kg"},
      {cat:"Sec", article:"Quinoa", unite:"un sachet de 2,5kg"},
      {cat:"Boissons", article:"Coca Cola rouge 33cl", unite:"une cannette"}
    ];
    buildRestaurants(["HiloFood Saint-Lazare", "HiloFood Cergy", "HiloFood Boetie"]);
    buildForm();
    hideLoading();
    return;
  }
  try {
    const r1 = await fetch(APPS_SCRIPT_URL + "?action=restaurants");
    const d1 = await r1.json();
    buildRestaurants(d1.restaurants);
    document.getElementById("select-restaurant").addEventListener("change", async function() {
      if (this.value) {
        showLoading();
        await loadRestaurantCatalogue(this.value);
        hideLoading();
      }
    });
    if (d1.restaurants && d1.restaurants[0]) {
      await loadRestaurantCatalogue(d1.restaurants[0]);
    }
    hideLoading();
  } catch(e) {
    hideLoading();
    document.getElementById("error-screen").classList.add("show");
  }
}

async function loadRestaurantCatalogue(restaurant) {
  const res = await fetch(APPS_SCRIPT_URL + "?action=catalogue&restaurant=" + encodeURIComponent(restaurant));
  const data = await res.json();
  INVENTORY = data.inventory || [];
  values = {};
  buildForm();
}

function hideLoading() {
  document.getElementById("loading-screen").classList.add("hide");
  setTimeout(() => document.getElementById("loading-screen").style.display = "none", 400);
}
function showLoading() {
  const s = document.getElementById("loading-screen");
  s.style.display = "flex";
  s.classList.remove("hide");
}

function buildRestaurants(restaurants) {
  const sel = document.getElementById("select-restaurant");
  sel.innerHTML = "<option value=''>Choisir…</option>";
  restaurants.forEach(r => {
    const opt = document.createElement("option");
    opt.value = r; opt.textContent = r;
    sel.appendChild(opt);
  });
}

function buildForm() {
  document.getElementById("input-date").valueAsDate = new Date();
  values = {};
  const body = document.getElementById("form-body");
  body.innerHTML = "";
  const cats = [...new Set(INVENTORY.map(i => i.cat))];
  cats.forEach(cat => {
    const items = INVENTORY.filter(i => i.cat === cat);
    const section = document.createElement("div");
    section.className = "section";
    section.innerHTML = `<div class="section-header"><div class="section-icon">${getIcon(cat)}</div><span class="section-title">${cat}</span><span class="section-count" id="count-${cat}">0 / ${items.length}</span></div><div class="articles-grid" id="grid-${cat}"></div>`;
    body.appendChild(section);
    const grid = section.querySelector("#grid-" + cat);
    items.forEach(item => {
      values[item.article] = "";
      const sk = item.article.replace(/[^a-zA-Z0-9]/g, "_");
      const card = document.createElement("div");
      card.className = "article-card";
      card.id = "card-" + sk;
      card.innerHTML = `<div class="article-info"><div class="article-name">${item.article}</div><div class="article-unit">${item.unite}</div></div><div class="qty-control"><button class="qty-btn" onclick="adjust('${item.article}',-1)" type="button">−</button><input class="qty-input" type="number" min="0" step="0.5" placeholder="—" id="inp-${sk}" oninput="setValue('${item.article}',this.value)"><button class="qty-btn" onclick="adjust('${item.article}',1)" type="button">+</button></div>`;
      grid.appendChild(card);
    });
  });
  document.getElementById("comments-section").style.display = "block";
  updateProgress();
}

function adjust(key, delta) {
  const sk = key.replace(/[^a-zA-Z0-9]/g, "_");
  const inp = document.getElementById("inp-" + sk);
  const v = Math.max(0, (parseFloat(inp.value) || 0) + delta);
  inp.value = v % 1 === 0 ? v : v.toFixed(1);
  setValue(key, inp.value);
}

function setValue(key, val) {
  values[key] = val;
  const sk = key.replace(/[^a-zA-Z0-9]/g, "_");
  const card = document.getElementById("card-" + sk);
  if (card) val !== "" ? card.classList.add("filled") : card.classList.remove("filled");
  updateProgress();
}

function updateProgress() {
  const filled = Object.values(values).filter(v => v !== "").length;
  const total = INVENTORY.length;
  const pct = total ? Math.round(filled / total * 100) : 0;
  document.getElementById("progress-fill").style.width = pct + "%";
  document.getElementById("progress-label").textContent = filled === 0 ? "Aucun article renseigné" : filled === 1 ? "1 article renseigné" : filled + " articles renseignés";
  document.getElementById("progress-pct").textContent = pct + "%";
  document.getElementById("btn-count").textContent = filled + " renseignés";
  const cats = [...new Set(INVENTORY.map(i => i.cat))];
  cats.forEach(cat => {
    const items = INVENTORY.filter(i => i.cat === cat);
    const done = items.filter(i => values[i.article] !== "").length;
    const el = document.getElementById("count-" + cat);
    if (el) el.textContent = done + " / " + items.length;
  });
}

async function submitForm() {
  const restaurant = document.getElementById("select-restaurant").value;
  const date = document.getElementById("input-date").value;
  document.getElementById("field-restaurant").classList.toggle("invalid", !restaurant);
  document.getElementById("field-date").classList.toggle("invalid", !date);
  if (!restaurant || !date) { showToast("Merci de renseigner le restaurant et la date."); return; }
  const filled = Object.values(values).filter(v => v !== "").length;
  if (filled === 0) { showToast("Renseignez au moins un article avant d'envoyer."); return; }
  const btn = document.getElementById("submit-btn");
  const label = document.getElementById("btn-label");
  btn.classList.add("loading");
  label.textContent = "Envoi en cours…";
  const payload = { restaurant, date, stocks: {}, commentaires: {
    commandes: document.getElementById("comment-commandes").value,
    saison: document.getElementById("comment-saison").value,
    general: document.getElementById("comment-general").value
  }};
  INVENTORY.forEach(item => { const v = values[item.article]; if (v !== "") payload.stocks[item.article] = parseFloat(v); });
  try {
    if (APPS_SCRIPT_URL !== "VOTRE_URL_WEB_APP_ICI") {
      await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
    }
    document.getElementById("success-msg").textContent = filled + " articles envoyés pour " + restaurant + " — " + new Date(date).toLocaleDateString("fr-FR", {day:"numeric",month:"long"});
    document.getElementById("success-screen").classList.add("show");
  } catch(e) {
    showToast("Erreur d'envoi. Vérifiez votre connexion.");
    btn.classList.remove("loading");
    label.textContent = "Envoyer l'inventaire";
  }
}

function resetForm() {
  document.getElementById("success-screen").classList.remove("show");
  document.getElementById("submit-btn").classList.remove("loading");
  document.getElementById("btn-label").textContent = "Envoyer l'inventaire";
  document.getElementById("comment-commandes").value = "";
  document.getElementById("comment-saison").value = "";
  document.getElementById("comment-general").value = "";
  INVENTORY.forEach(item => {
    values[item.article] = "";
    const sk = item.article.replace(/[^a-zA-Z0-9]/g, "_");
    const inp = document.getElementById("inp-" + sk);
    if (inp) inp.value = "";
    const card = document.getElementById("card-" + sk);
    if (card) card.classList.remove("filled");
  });
  document.getElementById("input-date").valueAsDate = new Date();
  updateProgress();
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

loadCatalogue();
</script>
</body>
</html>
